openapi: 3.0.0
info:
  version: 1.0.0
  title: ACME Banking API
paths: 
  /customers: 
    get: 
      description: Retrieve a list of customers
      summary: Get Customers
      parameters:
        - name: Accept
          in: header
          required: false
          schema:
            type: string
            example: application/json
      responses:
        '200':
          description: A list of customers
          headers:
            Cache-Control:
              description: The content type of the response
              schema:
                type: string
              required: true
            Expires:
              description: lifetime of the response by datetime
              schema:
                type: string
                example: '2024-12-31T23:59:59Z'
              required: true
          content:
            application/json:
              schema:
                type: object
        '404':
          description: No customers found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  statusCode:
                    type: string
                example:
                  message: No customers found
                  statusCode: FAILED
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
    post: 
      description: Create a new customer
      summary: Create Customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Customer created successfully
          headers:
            Location:
              description: URL of the newly created customer
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object

  /customers/{customerId}: 
    parameters:
      - name: customerId
        in: path
        required: true
        schema:
          type: string
    get: 
      description: Retrieve a specific customer by ID
      summary: Get Customer by ID
      responses:
        '200':
          description: Customer details retrieved successfully

  /customers/{customerId}/accounts: 
    parameters:
      - name: customerId
        in: path
        required: true
        schema:
          type: string
    get:
      description: Retrieve a list of accounts for a specific customer
      summary: Get Accounts for Customer
      responses:
        '200':
          description: A list of accounts for the customer

  /accounts: 
    get: 
      description: Retrieve a list of all accounts
      summary: Get Accounts
      responses:
        '200':
          description: A list of accounts
    post: 
      description: Create a new account
      summary: Create Account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Account created successfully
          headers:
            Location:
              description: URL of the newly created account
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object

  /accounts/{accountId}: 
    parameters:
      - name: accountId
        in: path
        required: true
        schema:
          type: string
    get: 
      description: Retrieve a specific account by ID
      summary: Get Account by ID
      responses:
        '200':
          description: Account details retrieved successfully

  /accounts/{accountId}/transactions: 
    parameters:
      - name: accountId
        in: path
        required: true
        schema:
          type: string
    get: 
      description: Retrieve a list of transactions for a specific account
      summary: Get Transactions for Account
      responses:
        '200':
          description: A list of transactions for the account

  /transactions: 
    post: 
      description: Create a new transaction
      summary: Create Transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Transaction created successfully
          headers:
            Location:
              description: URL of the newly created transaction
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  statusCode:
                    type: string
                example:
                  message: Invalid transaction data
                  statusCode: FAILED
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  statusCode:
                    type: string
                example:
                  message: Server error while processing transaction
                  statusCode: FAILED

  /transactions/{transactionId}: 
    parameters:
      - name: transactionId
        in: path
        required: true
        schema:
          type: string
    get: 
      description: Retrieve a specific transaction by ID
      summary: Get Transaction by ID
      responses:
        '200':
          description: Transaction details retrieved successfully
